name: Apply sampler and scheduler implementation

on:
  push:
    branches:
      - chatgpt-branch-test
    paths:
      - .github/workflows/sampler-scheduler-bootstrap.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct validated patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/dpmpp-patch/part*.b64 > /tmp/dpmpp2m-schedulers.patch.gz.b64
          base64 -d /tmp/dpmpp2m-schedulers.patch.gz.b64 | gzip -d > /tmp/dpmpp2m-schedulers.patch
      - name: Apply and commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git rm -f SAMPLER_SCHEDULER_COMMIT_NOTE.txt SAMPLER_SCHEDULER_MATRIX.bat SAMPLER_SCHEDULER_MATRIX.ps1
          git apply --check /tmp/dpmpp2m-schedulers.patch
          git apply --index /tmp/dpmpp2m-schedulers.patch
          git rm -r .github/dpmpp-patch
          git rm .github/workflows/sampler-scheduler-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add DPM++ 2M sampler and scheduler selection"
          git push origin HEAD:chatgpt-branch-test
